# MITRE ATT&CK technique catalog (subset)
# Source: https://attack.mitre.org/
# Version: ATT&CK v14
# Note: This is a curated subset covering techniques most frequently seen in SOC response.

techniques:

  T1021:
    id: T1021
    name: Remote Services
    tactic: Lateral Movement
    description: >
      Adversaries may use valid accounts to log into a service specifically
      designed to accept remote connections, such as SSH, RDP, or VNC, to
      move laterally across the network.
    url: https://attack.mitre.org/techniques/T1021/

  T1041:
    id: T1041
    name: Exfiltration Over C2 Channel
    tactic: Exfiltration
    description: >
      Adversaries may steal data by exfiltrating it over an existing command
      and control channel.
    url: https://attack.mitre.org/techniques/T1041/

  T1048:
    id: T1048
    name: Exfiltration Over Alternative Protocol
    tactic: Exfiltration
    description: >
      Adversaries may steal data by exfiltrating it over a different protocol
      than that used for command and control.
    url: https://attack.mitre.org/techniques/T1048/

  T1055:
    id: T1055
    name: Process Injection
    tactic: Defense Evasion
    description: >
      Adversaries may inject code into processes to evade process-based defences
      and potentially elevate privileges.
    url: https://attack.mitre.org/techniques/T1055/

  T1059:
    id: T1059
    name: Command and Scripting Interpreter
    tactic: Execution
    description: >
      Adversaries may abuse command and script interpreters to execute commands,
      scripts, or binaries.
    url: https://attack.mitre.org/techniques/T1059/

  T1059.001:
    id: T1059.001
    name: PowerShell
    tactic: Execution
    description: >
      Adversaries may abuse PowerShell commands and scripts for execution.
    url: https://attack.mitre.org/techniques/T1059/001/

  T1071:
    id: T1071
    name: Application Layer Protocol
    tactic: Command and Control
    description: >
      Adversaries may communicate using OSI application layer protocols to avoid
      detection/network filtering by blending in with existing traffic.
    url: https://attack.mitre.org/techniques/T1071/

  T1078:
    id: T1078
    name: Valid Accounts
    tactic: Defense Evasion
    description: >
      Adversaries may obtain and abuse credentials of existing accounts as a
      means of gaining initial access, persistence, privilege escalation, or
      defense evasion.
    url: https://attack.mitre.org/techniques/T1078/

  T1098:
    id: T1098
    name: Account Manipulation
    tactic: Persistence
    description: >
      Adversaries may manipulate accounts to maintain access to victim systems.
    url: https://attack.mitre.org/techniques/T1098/

  T1110:
    id: T1110
    name: Brute Force
    tactic: Credential Access
    description: >
      Adversaries may use brute force techniques to gain access to accounts
      when passwords are unknown or when password hashes are obtained.
    url: https://attack.mitre.org/techniques/T1110/

  T1204:
    id: T1204
    name: User Execution
    tactic: Execution
    description: >
      An adversary may rely upon specific actions by a user in order to gain
      execution.
    url: https://attack.mitre.org/techniques/T1204/

  T1210:
    id: T1210
    name: Exploitation of Remote Services
    tactic: Lateral Movement
    description: >
      Adversaries may exploit remote services to gain unauthorized access to
      internal systems once inside a network.
    url: https://attack.mitre.org/techniques/T1210/

  T1219:
    id: T1219
    name: Remote Access Software
    tactic: Command and Control
    description: >
      An adversary may use legitimate desktop support and remote access software
      as a means of command and control.
    url: https://attack.mitre.org/techniques/T1219/

  T1486:
    id: T1486
    name: Data Encrypted for Impact
    tactic: Impact
    description: >
      Adversaries may encrypt data on target systems or on large numbers of
      systems in a network to interrupt availability to system and network
      resources (ransomware).
    url: https://attack.mitre.org/techniques/T1486/

  T1550:
    id: T1550
    name: Use Alternate Authentication Material
    tactic: Lateral Movement
    description: >
      Adversaries may use alternate authentication material, such as password
      hashes, Kerberos tickets, and application access tokens, in order to move
      laterally within an environment.
    url: https://attack.mitre.org/techniques/T1550/

  T1556:
    id: T1556
    name: Modify Authentication Process
    tactic: Credential Access
    description: >
      Adversaries may modify authentication mechanisms and processes to access
      user credentials or enable otherwise unwarranted access to accounts.
    url: https://attack.mitre.org/techniques/T1556/

  T1566:
    id: T1566
    name: Phishing
    tactic: Initial Access
    description: >
      Adversaries may send phishing messages to gain access to victim systems.
    url: https://attack.mitre.org/techniques/T1566/

  T1566.001:
    id: T1566.001
    name: Spearphishing Attachment
    tactic: Initial Access
    description: >
      Adversaries may send spearphishing emails with a malicious attachment in
      an attempt to gain access to victim systems.
    url: https://attack.mitre.org/techniques/T1566/001/

  T1566.002:
    id: T1566.002
    name: Spearphishing Link
    tactic: Initial Access
    description: >
      Adversaries may send spearphishing emails with a malicious link in an
      attempt to gain access to victim systems.
    url: https://attack.mitre.org/techniques/T1566/002/

  T1583.001:
    id: T1583.001
    name: "Acquire Infrastructure: Domains"
    tactic: Resource Development
    description: >
      Adversaries may acquire domains that can be used during targeting.
    url: https://attack.mitre.org/techniques/T1583/001/

  T1598:
    id: T1598
    name: Phishing for Information
    tactic: Reconnaissance
    description: >
      Adversaries may send phishing messages to elicit sensitive information that
      can be used during targeting.
    url: https://attack.mitre.org/techniques/T1598/
