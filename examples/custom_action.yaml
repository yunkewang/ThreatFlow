# Example: Custom Action Definition
#
# This file shows how to define a custom action that doesn't exist in the
# default catalog. Save it to catalog/actions/ and it will be auto-loaded.
#
# See schemas/action.schema.json for the full schema reference.

id: snapshot_disk
name: Snapshot Host Disk
domain: endpoint
description: >
  Create a forensic disk snapshot of a host for evidence preservation and
  offline analysis. The snapshot is stored in the provider's evidence vault
  and does not affect host operation.

  Use before or immediately after isolating a host to preserve volatile state.
version: "1.0.0"
risk_level: low
approval_mode: none
supported_providers:
  - acme_siem      # your custom adapter
  - crowdstrike    # add when CrowdStrike RTR snapshot support is wired up

inputs:
  - name: host_id
    type: string
    required: true
    description: Platform-specific host or device identifier.
    example: "abc1234567890abcdef1234567890ab"

  - name: snapshot_label
    type: string
    required: false
    description: Human-readable label for the snapshot.
    default: "Forensic snapshot — OpenSecOps"

  - name: include_memory
    type: boolean
    required: false
    default: false
    description: Whether to include a memory dump alongside the disk snapshot.

outputs:
  - name: snapshot_id
    type: string
    description: Provider-specific snapshot identifier.

  - name: snapshot_url
    type: string
    description: URL to access the snapshot in the provider console.

  - name: size_gb
    type: number
    description: Snapshot size in gigabytes.

  - name: timestamp
    type: string
    description: ISO 8601 timestamp of snapshot creation.

d3fend_mappings:
  - technique_id: D3-EFI
    technique_name: Executable File Investigation
    tactic: Detect

attack_mappings:
  - technique_id: T1486
    technique_name: Data Encrypted for Impact
    tactic: Impact
    url: https://attack.mitre.org/techniques/T1486/

tags:
  - endpoint
  - forensics
  - evidence
  - containment
